worker_processes 2;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;

    keepalive_timeout 65;

    gzip on;
    gzip_proxied any;
    gzip_types application/vnd.mapbox-vector-tile application/x-protobuf application/json application/javascript;

    resolver 8.8.8.8 8.8.4.4 valid=300s ipv6=off;

    server {
        listen 80;
        server_name openinframap.org localhost;

        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        location ~ ^/basemap/([0-9]+)/([0-9]+)/([0-9]+)\.mvt$ {
            expires 7d;
            proxy_pass https://openinframap.org/20250311/$1/$2/$3.mvt;
            proxy_ssl_server_name on;
            proxy_set_header Host openinframap.org;
            proxy_set_header Origin "";
            proxy_set_header Referer "";
            add_header Access-Control-Allow-Origin *;
        }

        location ~ ^/blackmarble/([0-9]+)/([0-9]+)/([0-9]+)\.webp$ {
            expires 30d;
            proxy_pass https://openinframap.org/black-marble-2024/$1/$2/$3.webp;
            proxy_ssl_server_name on;
            proxy_set_header Host openinframap.org;
            proxy_set_header Origin "";
            proxy_set_header Referer "";
            add_header Access-Control-Allow-Origin *;
        }

        location ~ ^/satellite/([0-9]+)/([0-9]+)/([0-9]+)\.jpg$ {
            expires 30d;
            proxy_pass https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/$1/$3/$2;
            proxy_ssl_server_name on;
            proxy_set_header Host server.arcgisonline.com;
            proxy_set_header Origin "";
            proxy_set_header Referer "";
            add_header Access-Control-Allow-Origin *;
        }

        location /tiles {
            if ($uri ~ "/tiles/[0-3]/") {
                expires 48h;
            }
            if ($uri ~ "/tiles/[4-6]/") {
                expires 4h;
            }
            if ($uri ~ "/tiles/[7-9]/") {
                expires 1h;
            }
            if ($uri ~ "/tiles/(10|11|12|13|14|15|16)/") {
                expires 10m;
            }
            proxy_pass http://oim-tileserver/maps/openinframap;
        }

        location ~ ^/map/([a-z_]+)/([0-6])/([0-9]+)/([0-9]+).pbf$ {
            expires 4h;
            proxy_pass http://oim-tileserver/maps/$1/$2/$3/$4.pbf;
        }

        location ~ ^/map/([a-z_]+)/([7-9])/([0-9]+)/([0-9]+).pbf$ {
            expires 1h;
            proxy_pass http://oim-tileserver/maps/$1/$2/$3/$4.pbf;
        }

        location ~ ^/map/([a-z_]+)/([0-9]+)/([0-9]+)/([0-9]+).pbf$ {
            expires 5m;
            proxy_pass http://oim-tileserver/maps/$1/$2/$3/$4.pbf;
        }

        location /heatmap.json {
            proxy_pass http://oim-web-backend;
        }

        location /heatmap {
            expires 12h;
            proxy_pass http://oim-tileserver/maps/solar_heatmap;
        }

        location /wikidata {
            proxy_pass http://oim-web-backend;
        }

        location /search {
            proxy_pass http://oim-web-backend;
        }

        location /stats {
            proxy_pass http://oim-web-backend;
        }

        location /static {
            proxy_pass http://oim-web-backend;
        }

        location /copyright {
            proxy_pass http://oim-web-backend;
        }

        location /about.html {
            return 301 https://openinframap.org/about;
        }

        location /about {
            proxy_pass http://oim-web-backend;
        }

        location /exports {
            proxy_pass http://oim-web-backend;
        }

        location /api/export {
            proxy_pass http://oim-web-backend;
        }

        location /sitemap.xml {
            proxy_pass http://oim-web-backend;
        }

        location / {
            proxy_pass http://oim-web;
            proxy_no_cache 1;
            proxy_cache_bypass 1;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }
    }

    server {
        listen 80;
        server_name www.openinframap.org;
        return 301 https://openinframap.org$request_uri;
    }
}
