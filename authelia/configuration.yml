---
server:
  host: 0.0.0.0
  port: 9091
  path: authelia

log:
  level: warn

jwt_secret: CHANGEME_jwt_secret_at_least_20_chars

authentication_backend:
  file:
    path: /config/users_database.yml
    watch: true
    password:
      algorithm: argon2id
      iterations: 3
      memory: 65536
      parallelism: 4
      key_length: 32
      salt_length: 16

access_control:
  default_policy: one_factor

session:
  name: authelia_session
  secret: CHANGEME_session_secret_at_least_20_chars
  expiration: 12h
  inactivity: 2h
  domain: localhost

storage:
  encryption_key: CHANGEME_storage_key_at_least_20_chars
  local:
    path: /config/db.sqlite3

notifier:
  filesystem:
    filename: /config/notification.txt
