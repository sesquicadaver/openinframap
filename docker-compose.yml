volumes:
  postgres_data:
  imposm_cache:
  imposm_expiry:
  imposm_diff:
  weather_cache:

services:
  db:
    image: postgis/postgis:17-3.4-alpine
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema/dev-init.sql:/docker-entrypoint-initdb.d/90-dev-init.sql
      - ./schema/functions.sql:/docker-entrypoint-initdb.d/91-functions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -q"]
      interval: 5s
      timeout: 5s
      retries: 20

  imposm:
    build: imposm
    volumes:
      - imposm_cache:/imposm-cache
      - imposm_expiry:/imposm-expiry
      - imposm_diff:/imposm-diff
    command:
      - run
      - -expiretiles-dir
      - /imposm-expiry
      - -cachedir
      - /imposm-cache
      - -diffdir
      - /imposm-diff
      - -mapping
      - /mapping.json
      - -connection
      - "postgis://osm:osm@db/osm"

  tegola:
    build: tegola
    environment:
      DB_URI: "postgres://osm:osm@db:5432/osm"
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      default:
        aliases:
          - oim-tileserver

  web-backend:
    build: web-backend
    environment:
      DATABASE_URL: "postgresql://osm:osm@db/osm"
      DEBUG: "false"
      WINDY_POINT_FORECAST_API_KEY: "${WINDY_POINT_FORECAST_API_KEY:-}"
      WEATHER_CACHE_DIR: "/data/weather_cache"
    volumes:
      - weather_cache:/data/weather_cache
    depends_on:
      db:
        condition: service_healthy
    networks:
      default:
        aliases:
          - oim-web-backend

  web:
    build:
      context: web
      dockerfile: Dockerfile.prod
      args:
        VITE_OIM_TILE_BASE: ""
    networks:
      default:
        aliases:
          - oim-web

  authelia:
    image: authelia/authelia:4.37.5
    volumes:
      - ./authelia:/config
    networks:
      default:
        aliases:
          - oim-authelia
    restart: unless-stopped

  gem-import:
    build:
      context: imposm
      dockerfile: Dockerfile.gem
    environment:
      DB_URI: "postgresql://osm:osm@db:5432/osm"
    volumes:
      - ./gem-data:/data:ro
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - import

  weather-ingest:
    build: web-backend
    entrypoint: ["uv", "run", "python", "-m", "weather.ingest_loop"]
    environment:
      DATABASE_URL: "postgresql://osm:osm@db/osm"
      WEATHER_CACHE_DIR: "/data/weather_cache"
      INGEST_SOURCE: "${INGEST_SOURCE:-icon-eu}"
      INGEST_INTERVAL_H: "${INGEST_INTERVAL_H:-3}"
    volumes:
      - weather_cache:/data/weather_cache
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web-router:
    build: web-router
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
      - web-backend
      - tegola
      - authelia